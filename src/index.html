  <script type="module" src="./main.js"></script>

<script>
  // Ініціалізуємо всі галереї (вони невидимі, тому нічого не заважає)
  const galleries = {};
  galleries.personal = new SimpleLightbox('#personal a', { /* опції */ });
  galleries.hochzeiten    = new SimpleLightbox('#hochzeiten a',    { /* опції */ });
  galleries.hochzeitspaket    = new SimpleLightbox('#hochzeitspaket a',    { /* опції */ });

  // Однакові опції для всіх
  const options = {
    captions: true,
    captionType: 'title',
    navText: ['←', '→'],
    swipeClose: true,
    showCounter: true,
    docClose: true,
    fadeSpeed: 300
  };

  // Краще так — один раз опції
  Object.keys(galleries).forEach(key => {
    galleries[key] = new SimpleLightbox(`#${key} a`, options);
  });

  // Обробка кліків по кнопках
  document.querySelectorAll('.open-gallery').forEach(btn => {
    btn.addEventListener('click', function() {
      const galId = this.getAttribute('data-gallery');
      const gallery = galleries[galId];
      
      if (gallery) {
        gallery.open();  // відкриває галерею з першого фото
      }
    });
  });
</script>
